services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app_net

  plc-sim:
    build:
      context: .
      dockerfile: sims/plc/Dockerfile
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DEVICE_NAME: plc
      DATABASE_URL: ${DATABASE_URL}
    networks:
      ot_net:
        ipv4_address: ${PLC_IP}
      app_net:

  hmi-sim:
    build:
      context: .
      dockerfile: sims/hmi/Dockerfile
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DEVICE_NAME: hmi
      DATABASE_URL: ${DATABASE_URL}
    networks:
      ot_net:
        ipv4_address: ${HMI_IP}
      app_net:

  sensor1-sim:
    build:
      context: .
      dockerfile: sims/sensor/Dockerfile
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DEVICE_NAME: sensor1
      DATABASE_URL: ${DATABASE_URL}
    networks:
      ot_net:
        ipv4_address: ${SENSOR1_IP}
      app_net:

  sensor2-sim:
    build:
      context: .
      dockerfile: sims/sensor/Dockerfile
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DEVICE_NAME: sensor2
      DATABASE_URL: ${DATABASE_URL}
    networks:
      ot_net:
        ipv4_address: ${SENSOR2_IP}
      app_net:

  sensor3-sim:
    build:
      context: .
      dockerfile: sims/sensor/Dockerfile
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DEVICE_NAME: sensor3
      DATABASE_URL: ${DATABASE_URL}
    networks:
      ot_net:
        ipv4_address: ${SENSOR3_IP}
      app_net:

  detector:
    build:
      context: ./detector
      dockerfile: Dockerfile
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      DEVICE_NAME: detector
      MONITOR_IFACE: otbr0
      API_BASE_URL: ${DETECTOR_API_BASE_URL}
      AGG_INTERVAL_SECONDS: 1
      WARMUP_SECONDS: 60
      SILENCE_SECONDS: 10
      BURST_MULTIPLIER: 3.0
      LARGE_PAYLOAD_THRESHOLD: 256
      JITTER_MULTIPLIER: 3.0
      RST_STORM_THRESHOLD: 3
      DETECTOR_MODE: hybrid
      ENABLE_ML: "false"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "5173:5173"
    networks:
      - app_net

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      FRONTEND_URLS: ${FRONTEND_URLS}
      OBS_RETENTION_MINUTES: 10
      OBS_CLEANUP_INTERVAL_SECONDS: 30
      LIVE_POLL_WINDOW_MINUTES: 10
    ports:
      - "8000:8000"
    networks:
      - app_net

networks:
  ot_net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: otbr0
    ipam:
      config:
        - subnet: ${SUBNET}

  app_net:
    driver: bridge

volumes:
  postgres_data: