name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          pip install ruff

      - name: Lint Python code
        run: |
          ruff check api detector sims

      - name: Syntax check Python
        run: |
          python -m compileall api detector sims

  frontend-checks:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  integration:
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare env file
        run: cp .env.example .env

      - name: Validate Docker Compose
        run: docker compose -f compose.yaml config

      - name: Build API image
        run: docker build -f api/Dockerfile -t ot-monitoring-api .

      - name: Build Frontend image
        run: docker build -f frontend/Dockerfile -t ot-monitoring-frontend ./frontend

      - name: Build Detector image
        run: docker build -f detector/Dockerfile -t ot-monitoring-detector ./detector

      - name: Start postgres and api
        run: docker compose up -d --build postgres api

      - name: Wait for API
        run: sleep 20

      - name: Smoke test API health
        run: curl --fail http://localhost:8000/health

      - name: Stop services
        if: always()
        run: docker compose down -v